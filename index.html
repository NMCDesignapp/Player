<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Music Player - LocalStorage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #808080;
            --bg-screen: #000000;
            --bg-panel: #505050;
            --btn-bg: #2a2a2a;
            --btn-border: #444;
            --accent: #ff0055;
            --text-main: #fff;
            --text-yellow: #ffd700;
            
            /* Màu LED */
            --led-off: #1a1a1a;
            --led-low: #00e676;  
            --led-mid: #ffea00;  
            --led-high: #ff1744; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- PHẦN 1: MÀN HÌNH CHÍNH --- */
        .main-screen {
            background-color: var(--bg-screen);
            flex: 1;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* SIGNATURE */
        .signature {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 0.9rem;
            color: #888;
            z-index: 25;
            letter-spacing: 1px;
            pointer-events: none;
        }
        .signature span {
            font-weight: 800;
            color: var(--text-yellow);
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .top-info {
            position: absolute;
            top: 25px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
            padding: 0 20px;
        }
        .song-title-display { font-size: 1.5rem; font-weight: 800; text-shadow: 0 2px 10px black; margin-bottom: 5px; }
        .song-time-display { font-size: 0.9rem; color: var(--accent); font-family: monospace; }

        .visual-full {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            z-index: 5;
            padding: 0 10%;
        }
        .visual-bar {
            width: 100%;
            background: linear-gradient(to top, var(--accent), transparent);
            border-radius: 2px 2px 0 0;
            transition: height 0.1s ease;
        }

        .controls-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
        }

        .progress-wrapper {
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .progress-time { font-size: 0.8rem; color: #ccc; width: 45px; text-align: center; }
        #seek-slider {
            flex: 1;
            height: 6px;
            background: #222;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }
        #seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            cursor: pointer;
        }

        /* DÃY PHÍM CHỨC NĂNG */
        .control-row {
            background: rgba(40, 40, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid #555; /* Viền mặc định */
            height: 50px;
            gap: 10px;
        }
        .ctrl-btn {
            background: transparent;
            color: white;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            padding: 5px 12px;
            border-radius: 6px;
            position: relative;
        }
        /* Hiệu ứng Viền LED Đỏ khi Hover */
        .ctrl-btn:hover {
            color: var(--accent);
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 10px var(--accent); /* Ánh sáng đỏ */
            border: 1px solid var(--accent); /* Viền đỏ */
        }
        .ctrl-btn.play-pause {
            color: var(--accent);
            font-weight: 800;
            font-size: 1rem;
        }

        /* --- PHẦN 2: KHU VỰC DƯỚI --- */
        .bottom-area {
            height: 35vh;
            display: grid;
            grid-template-columns: 1fr 70px;
            gap: 15px;
        }

        /* Playlist */
        .playlist-container {
            background-color: var(--bg-panel);
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 90px; 
            gap: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
            border: 1px solid #666;
        }

        .song-btn {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: #ddd;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 10px;
            transition: 0.3s;
        }
        .song-btn:hover, .song-btn.playing {
            box-shadow: 0 0 15px var(--accent);
            border-color: var(--accent);
            color: white;
            background: #333;
        }
        .song-btn.playing { background: rgba(255,0,85,0.15); }
        
        .song-name { 
            font-size: 0.85rem; 
            text-align: center; 
            word-break: break-word; 
            font-weight: 500;
            line-height: 1.3; 
            width: 100%;
        }
        
        .song-settings-icon {
            position: absolute;
            top: 5px; right: 5px;
            font-size: 0.7rem;
            color: #666;
            padding: 3px;
            z-index: 2;
            opacity: 0;
            border-radius: 2px;
            background: rgba(0,0,0,0.3);
        }
        .song-btn:hover .song-settings-icon { opacity: 1; color: white; background: var(--accent); }

        /* --- THANH ÂM LƯỢNG LED --- */
        .volume-sidebar {
            background-color: var(--bg-panel);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 15px 0;
            border: 1px solid #666;
        }

        .led-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 3px;
            height: 90%;
            width: 30px;
            justify-content: flex-start;
            align-items: center;
        }

        .led-bar {
            width: 100%;
            height: 12px; 
            background: var(--led-off);
            border-radius: 2px;
            transition: all 0.1s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .led-bar.active {
            box-shadow: 0 0 8px currentColor;
        }

        #vol-slider {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
            transform: rotate(-90deg);
            width: 200%;
            left: -50%;
        }

        /* --- MODAL THÊM NHẠC --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 8px;
            width: 350px; border: 1px solid #555; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-bottom: 20px; color: var(--accent); }
        
        .input-group {
            text-align: left; margin-bottom: 15px;
        }
        .input-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .input-group input[type="text"] {
            width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;
        }
        
        /* File input custom */
        .file-upload {
            border: 2px dashed #555; padding: 20px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; color: #aaa; font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .file-upload:hover { border-color: var(--accent); color: white; background: rgba(255,0,85,0.05); }
        #file-input { display: none; }

        .modal-actions { display: flex; gap: 10px; }
        .btn-modal { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; flex: 1; }
        .btn-save { background: var(--accent); }
        .btn-close { background: #444; }

        /* Modal Cài đặt bài */
        #settings-modal .modal-content { width: 320px; }
        #settings-modal input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #111; border: 1px solid #444; color: white;
            border-radius: 4px; font-size: 1rem;
        }

        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- MÀN HÌNH CHÍNH -->
        <div class="main-screen">
            <div class="signature">Design by <span>NMC</span></div>

            <div class="top-info">
                <div class="song-title-display" id="main-title">Chưa chọn bài</div>
                <div class="song-time-display" id="main-time">00:00 / 00:00</div>
            </div>

            <div class="visual-full" id="visualizer">
                <!-- JS tạo bars -->
            </div>

            <div class="controls-area">
                <div class="progress-wrapper">
                    <span class="progress-time" id="curr-time-txt">-00:00</span>
                    <input type="range" id="seek-slider" min="0" max="100" value="0">
                    <span class="progress-time" id="total-time-txt">00:00</span>
                </div>

                <!-- DÃY PHÍM CHỨC NĂNG -->
                <div class="control-row">
                    <button class="ctrl-btn" id="btn-prev">PREV</button>
                    <button class="ctrl-btn play-pause" id="btn-play">PLAY</button>
                    <button class="ctrl-btn" id="btn-next">NEXT</button>
                    <button class="ctrl-btn" id="btn-add">ADD</button>
                </div>
            </div>
        </div>

        <!-- KHU VỰC DƯỚI -->
        <div class="bottom-area">
            <div class="playlist-container" id="playlist-container">
                <!-- Danh sách rỗng hoặc từ LocalStorage -->
            </div>

            <div class="volume-sidebar">
                <div class="led-container" id="led-bars"></div>
                <input type="range" id="vol-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <!-- Modal Thêm Nhạc -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <h3>Thêm nhạc từ máy</h3>
            <div class="input-group">
                <label>Tên bài hát (Tên nút bấm)</label>
                <input type="text" id="new-song-name" placeholder="Nhập tên hiển thị...">
            </div>
            
            <div class="file-upload" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-music"></i> Chọn file nhạc từ bộ nhớ
            </div>
            <input type="file" id="file-input" accept="audio/*">

            <div class="modal-actions">
                <button class="btn-modal btn-close" onclick="closeModal('add-modal')">Hủy</button>
                <button class="btn-modal btn-save" id="btn-confirm-add">Thêm vào danh sách</button>
            </div>
        </div>
    </div>

    <!-- Modal Cài Đặt Bài Hát -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3>Cài đặt bài hát</h3>
            <p id="modal-song-name" style="color:#aaa; font-size:0.9rem; margin-bottom:10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
            <label style="display:block; text-align:left; font-size:0.8rem; margin-left:5px;">Bắt đầu (giây)</label>
            <input type="number" id="input-start" placeholder="0">
            <label style="display:block; text-align:left; font-size:0.8rem; margin-left:5px;">Kết thúc (giây)</label>
            <input type="number" id="input-end" placeholder="Kết thúc">
            <div class="modal-actions">
                <button class="btn-modal btn-del" id="btn-delete-song" style="background: #d32f2f;">Xóa</button>
                <button class="btn-modal btn-save" id="btn-save-settings">Lưu</button>
            </div>
            <button class="btn-modal" onclick="document.getElementById('settings-modal').style.display='none'" style="width:100%; margin-top:15px; background:#444;">Đóng</button>
        </div>
    </div>

    <script>
        // --- LOGIC LOCALSTORAGE ---
        // Khóa lưu trữ
        const STORAGE_KEY = 'nmc_player_songs';

        // Hàm lấy danh sách bài hát
        function getSongs() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                return JSON.parse(stored);
            }
            // Trả về mảng rỗng nếu chưa có dữ liệu
            return [];
        }

        // Hàm lưu danh sách bài hát
        function saveSongs(songsArray) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(songsArray));
        }

        // Dữ liệu chạy thực tế
        let songs = getSongs();
        let currentIndex = -1;
        let isPlaying = false;
        let currentVolume = 50;
        let editingIndex = -1;
        let audioElement = new Audio();
        let playInterval;
        let isDraggingProgress = false;

        // DOM Elements
        const mainTitle = document.getElementById('main-title');
        const mainTime = document.getElementById('main-time');
        const currTimeTxt = document.getElementById('curr-time-txt');
        const totalTimeTxt = document.getElementById('total-time-txt');
        const seekSlider = document.getElementById('seek-slider');
        const playlistContainer = document.getElementById('playlist-container');
        const visualizer = document.getElementById('visualizer');
        const ledContainer = document.getElementById('led-bars');
        
        // Modals
        const addModal = document.getElementById('add-modal');
        const settingsModal = document.getElementById('settings-modal');
        const modalSongName = document.getElementById('modal-song-name');
        const inputStart = document.getElementById('input-start');
        const inputEnd = document.getElementById('input-end');

        // --- INIT ---
        function init() {
            createVisualBars(40);
            createLedBars(20); 
            renderPlaylist();
            updateLedVisual(currentVolume);
        }

        function createVisualBars(count) {
            visualizer.innerHTML = '';
            for(let i=0; i<count; i++) {
                let bar = document.createElement('div');
                bar.className = 'visual-bar';
                visualizer.appendChild(bar);
            }
        }

        function createLedBars(count) {
            ledContainer.innerHTML = '';
            for(let i=0; i<count; i++) {
                let bar = document.createElement('div');
                bar.className = 'led-bar';
                ledContainer.appendChild(bar);
            }
        }

        // --- CẬP NHẬT THỜI GIAN ---
        function updateTimeDisplay() {
            const cur = Math.floor(audioElement.currentTime);
            const song = songs[currentIndex];
            if (!song) return;

            let displayTime = isDraggingProgress ? parseInt(seekSlider.value) : cur;
            let remaining = song.end - displayTime;

            // Mặc định hiển thị thời gian còn lại
            currTimeTxt.innerText = "-" + formatTime(remaining);

            seekSlider.value = displayTime;
            totalTimeTxt.innerText = formatTime(song.end - song.start);
            mainTime.innerText = `${formatTime(cur)} / ${formatTime(song.end)}`;
        }

        function formatTime(seconds) {
            let m = Math.floor(seconds/60);
            let s = Math.floor(seconds%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }

        // --- DRAG PROGRESS ---
        seekSlider.addEventListener('mousedown', () => { isDraggingProgress = true; });
        seekSlider.addEventListener('touchstart', () => { isDraggingProgress = true; });
        seekSlider.addEventListener('input', updateTimeDisplay);
        seekSlider.addEventListener('mouseup', () => {
            isDraggingProgress = false;
            audioElement.currentTime = parseInt(seekSlider.value);
            updateTimeDisplay();
        });
        seekSlider.addEventListener('touchend', () => {
            isDraggingProgress = false;
            audioElement.currentTime = parseInt(seekSlider.value);
            updateTimeDisplay();
        });

        // --- VISUALIZER ---
        function startVisualAnimation() {
            if (playInterval) clearInterval(playInterval);
            playInterval = setInterval(() => {
                if (!isPlaying) { clearInterval(playInterval); playInterval = null; return; }
                if (audioElement.currentTime < songs[currentIndex].end) {
                    audioElement.currentTime += 1;
                } else {
                    let next = (currentIndex + 1) % songs.length;
                    handleSongSelection(next);
                    return;
                }
                updateTimeDisplay();

                const bars = document.querySelectorAll('.visual-bar');
                bars.forEach(bar => {
                    let h = Math.random() * 100;
                    bar.style.height = h + '%';
                    if(h > 70) bar.style.background = 'var(--accent)';
                    else bar.style.background = 'linear-gradient(to top, var(--accent), transparent)';
                });
            }, 100); 
        }

        function stopVisualAnimation() {
            if (playInterval) clearInterval(playInterval);
            playInterval = null;
            const bars = document.querySelectorAll('.visual-bar');
            bars.forEach(bar => { bar.style.height = '0%'; bar.style.background = 'transparent'; });
        }

        function updateLedVisual(vol) {
            const bars = document.querySelectorAll('.led-bar');
            const numLit = Math.ceil((vol / 100) * bars.length);
            bars.forEach((bar, index) => {
                bar.classList.remove('active');
                if (index < numLit) {
                    let percent = (index / bars.length) * 100;
                    if (percent < 50) { bar.style.backgroundColor = 'var(--led-low)'; bar.style.color = 'var(--led-low)'; }
                    else if (percent < 80) { bar.style.backgroundColor = 'var(--led-mid)'; bar.style.color = 'var(--led-mid)'; }
                    else { bar.style.backgroundColor = 'var(--led-high)'; bar.style.color = 'var(--led-high)'; }
                    bar.classList.add('active');
                } else {
                    bar.style.backgroundColor = 'var(--led-off)'; bar.style.boxShadow = 'none';
                }
            });
        }

        // --- RENDER PLAYLIST ---
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            songs.forEach((song, index) => {
                const btn = document.createElement('div');
                btn.className = `song-btn ${index === currentIndex ? 'playing' : ''}`;
                btn.innerHTML = `
                    <i class="fas fa-cog song-settings-icon" title="Cài đặt"></i>
                    <span class="song-name">${song.name}</span>
                `;
                btn.addEventListener('click', (e) => {
                    if (e.target.classList.contains('song-settings-icon')) openSettings(index);
                    else handleSongSelection(index);
                });
                playlistContainer.appendChild(btn);
            });
        }

        // --- XỬ LÝ THÊM NHẠC (ADD) ---
        document.getElementById('btn-add').addEventListener('click', () => {
            // Reset form
            document.getElementById('new-song-name').value = '';
            document.getElementById('file-input').value = '';
            addModal.style.display = 'flex';
        });

        // Xử lý khi chọn file (để hiện tên file tự động vào ô nhập tên)
        document.getElementById('file-input').addEventListener('change', function(e) {
            if (this.files && this.files[0]) {
                let fileName = this.files[0].name.replace(/\.[^/.]+$/, ""); // Bỏ đuôi mở rộng
                document.getElementById('new-song-name').value = fileName;
            }
        });

        document.getElementById('btn-confirm-add').addEventListener('click', () => {
            let name = document.getElementById('new-song-name').value.trim();
            let fileInput = document.getElementById('file-input');

            if (!name) { alert("Vui lòng nhập tên bài hát!"); return; }
            if (!fileInput.files || !fileInput.files[0]) { alert("Vui lòng chọn file nhạc!"); return; }

            // Tạo URL tạm cho file (Lưu ý: URL này sẽ mất nếu tải lại trang trừ khi dùng cách lưu file phức tạp hơn)
            // Tuy nhiên, để đơn giản cho file HTML độc lập, ta dùng URL.createObjectURL
            let fileUrl = URL.createObjectURL(fileInput.files[0]);

            let newSong = {
                id: Date.now(),
                name: name,
                url: fileUrl, // Lưu URL blob
                duration: 300, // Mặc định 5 phút, sẽ update khi load audio
                start: 0,
                end: 300
            };

            // Load audio một chút để lấy độ dài thực
            let tempAudio = new Audio(fileUrl);
            tempAudio.addEventListener('loadedmetadata', () => {
                newSong.duration = tempAudio.duration;
                newSong.end = tempAudio.duration;
                
                // Thêm vào mảng và lưu
                songs.push(newSong);
                saveSongs(songs); // LƯU VÀO LOCALSTORAGE
                renderPlaylist();
                closeModal('add-modal');
            });
            
            // Fallback nếu không lấy được metadata
            setTimeout(() => {
                if (newSong.duration === 300 && tempAudio.duration === 300) {
                    songs.push(newSong);
                    saveSongs(songs);
                    renderPlaylist();
                    closeModal('add-modal');
                }
            }, 2000);
        });

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // --- CÀI ĐẶT BÀI HÁT ---
        function openSettings(index) {
            editingIndex = index;
            const song = songs[index];
            modalSongName.innerText = song.name;
            inputStart.value = song.start;
            inputEnd.value = song.end;
            settingsModal.style.display = 'flex';
        }

        document.getElementById('btn-save-settings').addEventListener('click', () => {
            if (editingIndex > -1) {
                let s = parseInt(inputStart.value);
                let e = parseInt(inputEnd.value);
                if (s >= 0 && e > s) {
                    songs[editingIndex].start = s;
                    songs[editingIndex].end = e;
                    songs[editingIndex].duration = e - s;
                    saveSongs(songs); // Lưu thay đổi
                    if (currentIndex === editingIndex) loadSongData(currentIndex);
                    settingsModal.style.display = 'none';
                } else alert("Thời gian không hợp lệ!");
            }
        });

        document.getElementById('btn-delete-song').addEventListener('click', () => {
            if (confirm("Xóa bài này khỏi danh sách?")) {
                songs.splice(editingIndex, 1);
                saveSongs(songs); // Lưu thay đổi
                if (currentIndex === editingIndex) {
                    pauseMusic();
                    audioElement.currentTime = 0;
                    audioElement.src = "";
                    currentIndex = -1;
                    mainTitle.innerText = "Danh sách phát";
                } else if (currentIndex > editingIndex) {
                    currentIndex--;
                }
                renderPlaylist();
                settingsModal.style.display = 'none';
            }
        });

        // --- LOGIC PHÁT NHẠC ---
        function handleSongSelection(index) {
            if (index === currentIndex && isPlaying) { togglePlay(); return; }
            if (isPlaying) { audioElement.volume = 0; }
            
            currentIndex = index;
            loadSongData(index);
            playMusic();
        }

        function loadSongData(index) {
            const song = songs[index];
            mainTitle.innerText = song.name;
            
            // Kiểm tra URL có hợp lệ không (đôi khi LocalStorage cũ bị mất Blob URL)
            if (song.url) {
                audioElement.src = song.url;
                audioElement.load();
            }
            
            seekSlider.min = song.start;
            seekSlider.max = song.end;
            audioElement.currentTime = song.start;
            updateTimeDisplay();
            renderPlaylist();
        }

        function playMusic() {
            isPlaying = true;
            document.getElementById('btn-play').innerText = 'PAUSE';
            audioElement.play().catch(e => console.log("Lỗi phát nhạc (có thể do file không tìm thấy sau tải lại trang)"));
            startVisualAnimation();
        }

        function pauseMusic() {
            isPlaying = false;
            document.getElementById('btn-play').innerText = 'PLAY';
            audioElement.pause();
            stopVisualAnimation();
        }

        function togglePlay() {
            if (currentIndex === -1 && songs.length > 0) handleSongSelection(0);
            else if (isPlaying) pauseMusic();
            else playMusic();
        }

        document.getElementById('btn-play').addEventListener('click', togglePlay);
        document.getElementById('btn-next').addEventListener('click', () => {
            let next = (currentIndex + 1) % songs.length;
            handleSongSelection(next);
        });
        document.getElementById('btn-prev').addEventListener('click', () => {
            let prev = (currentIndex - 1 + songs.length) % songs.length;
            handleSongSelection(prev);
        });

        const volSlider = document.getElementById('vol-slider');
        volSlider.addEventListener('input', (e) => {
            currentVolume = parseInt(e.target.value);
            updateLedVisual(currentVolume);
            audioElement.volume = currentVolume / 100;
        });

        init();
    </script>
</body>
</html>
