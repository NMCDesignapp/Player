<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Music Player - NMC Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #0a0a0f;
            background-image: radial-gradient(ellipse at 20% 50%, rgba(255, 0, 85, 0.03) 0%, transparent 50%),
                              radial-gradient(ellipse at 80% 50%, rgba(0, 212, 255, 0.03) 0%, transparent 50%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 100%;
            height: 100dvh;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-screen {
            background: linear-gradient(145deg, #0d0d18 0%, #000005 100%);
            flex: 1;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 1px rgba(255, 255, 255, 0.1);
            min-height: 0;
        }

        .main-screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255, 0, 85, 0.08) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
            animation: ambientPulse 4s ease-in-out infinite alternate;
        }

        @keyframes ambientPulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .signature {
            position: absolute;
            top: 12px;
            right: 18px;
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            color: #555;
            z-index: 25;
            pointer-events: none;
            letter-spacing: 2px;
        }

        .signature span {
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .top-info {
            position: absolute;
            top: 18px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 20;
            padding: 0 25px;
        }

        .song-title-display {
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            margin-bottom: 4px;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, #ff6b9d, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShimmer 3s linear infinite;
        }

        @keyframes titleShimmer {
            to { background-position: 200% center; }
        }

        .song-time-display {
            font-size: 0.8rem;
            color: #ff0055;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
        }

        .visual-full {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            z-index: 5;
            padding: 0 8%;
            perspective: 600px;
        }

        .visual-bar {
            flex: 1;
            max-width: 12px;
            min-width: 4px;
            border-radius: 3px 3px 0 0;
            transition: height 0.08s ease-out;
            transform-origin: bottom;
        }

        .visual-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 160px;
            height: 160px;
            z-index: 4;
            pointer-events: none;
            opacity: 0.5;
        }

        .visual-ring canvas {
            width: 100%;
            height: 100%;
        }

        .controls-area {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
        }

        .progress-wrapper {
            width: 100%;
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            padding: 10px 15px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .progress-time {
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            color: #888;
            width: 48px;
            text-align: center;
        }

        #seek-slider {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        #seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #fff 60%, #ff0055);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            cursor: pointer;
            transition: transform 0.15s;
        }

        #seek-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .control-row {
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 14px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            height: 58px;
            gap: 6px;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #ff0055;
            border: 1.5px solid rgba(255, 0, 85, 0.5);
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.15), inset 0 0 8px rgba(255, 0, 85, 0.05);
            font-family: 'Orbitron', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn:active {
            background: #ff0055;
            color: white;
            text-shadow: 0 0 15px white;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.4);
            transform: scale(0.95);
        }

        .ctrl-btn.active-loop {
            background: linear-gradient(135deg, #ff0055, #ff3377);
            color: white;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.4);
            animation: loopGlow 2s ease-in-out infinite;
        }

        @keyframes loopGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 0, 85, 0.4); }
            50% { box-shadow: 0 0 35px rgba(255, 0, 85, 0.6); }
        }

        .bottom-area {
            height: 32vh;
            display: flex;
            gap: 10px;
        }

        .playlist-container {
            background: #12121a;
            border-radius: 16px;
            padding: 12px;
            overflow-y: auto;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 80px;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            align-content: start;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .playlist-container::-webkit-scrollbar {
            width: 4px;
        }

        .playlist-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist-container::-webkit-scrollbar-thumb {
            background: rgba(255, 0, 85, 0.3);
            border-radius: 2px;
        }

        .song-btn {
            background: linear-gradient(145deg, #16162a, #0f0f1a);
            color: #aaa;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4), -2px -2px 8px rgba(255, 255, 255, 0.02);
        }

        .song-btn:active {
            transform: translateY(2px) scale(0.97);
        }

        .song-btn.playing {
            color: white;
            background: linear-gradient(145deg, rgba(255, 0, 85, 0.2), rgba(255, 0, 85, 0.05));
            border: 1.5px solid rgba(255, 0, 85, 0.6);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
            animation: playingPulse 2s infinite;
        }

        @keyframes playingPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 85, 0.15); }
            50% { box-shadow: 0 0 25px rgba(255, 0, 85, 0.35); }
        }

        .song-name {
            font-size: 0.78rem;
            text-align: center;
            word-break: break-word;
            font-weight: 600;
            line-height: 1.3;
            width: 100%;
        }

        /* Nút cài đặt trên mỗi bài hát */
        .song-settings-icon {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.7rem;
            color: #888;
            background: rgba(0,0,0,0.6);
            width: 20px;
            height: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: 0.2s;
            z-index: 10;
            opacity: 0.7;
            cursor: pointer;
        }
        .song-settings-icon:hover {
            opacity: 1;
            color: #ff0055;
            background: rgba(0,0,0,0.8);
            transform: scale(1.1);
        }

        .volume-sidebar {
            background: #12121a;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 85px;
            min-width: 85px;
            flex-shrink: 0;
            touch-action: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            gap: 8px;
        }

        .sys-vol-label {
            font-family: 'Orbitron', monospace;
            font-size: 0.55rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .sys-vol-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.55rem;
            font-family: 'Orbitron';
            font-weight: 700;
        }

        .sys-vol-badge.linked {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        .sys-vol-badge.unlinked {
            background: rgba(255, 23, 68, 0.1);
            color: #ff1744;
            border: 1px solid rgba(255, 23, 68, 0.2);
        }

        .led-container {
            display: flex;
            flex-direction: column-reverse;
            gap: 4px;
            height: 70%;
            width: 40px;
            justify-content: flex-start;
            align-items: center;
            pointer-events: none;
        }

        .led-bar {
            width: 100%;
            height: 10px;
            background: #1a1a1a;
            border-radius: 3px;
            transition: background-color 0.1s ease, box-shadow 0.1s;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.6);
        }

        .led-bar.active {
            box-shadow: 0 0 6px currentColor;
        }

        .vol-percent {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 900;
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.4);
            pointer-events: none;
            margin-top: 2px;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(20, 20, 35, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #fff;
            z-index: 200;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            font-family: 'Inter', sans-serif;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a2e, #12121a);
            padding: 30px;
            border-radius: 16px;
            width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .modal-content h3 {
            font-family: 'Orbitron';
            margin-bottom: 20px;
            color: #ff0055;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 0.8rem;
            color: #aaa;
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }

        .file-upload {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .file-upload:hover {
            border-color: #ff0055;
            color: #ff0055;
        }

        #file-input {
            display: none;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-modal {
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ff0055;
            color: white;
            font-weight: bold;
            flex: 1;
        }

        .btn-modal.cancel {
            background: #333;
        }
        .btn-modal.danger {
            background: #aa2e4e;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-screen">
        <div class="signature">NMC<span> PRO</span></div>
        <div class="top-info">
            <div class="song-title-display" id="current-song-title">Chọn bài hát</div>
            <div class="song-time-display" id="current-time-display">0:00 / 0:00</div>
        </div>

        <div class="visual-full" id="visualizerBars"></div>
        <div class="visual-ring">
            <canvas id="ringCanvas" width="160" height="160"></canvas>
        </div>

        <div class="controls-area">
            <div class="progress-wrapper">
                <span class="progress-time" id="current-time">0:00</span>
                <input type="range" id="seek-slider" value="0" step="0.01">
                <span class="progress-time" id="duration-time">0:00</span>
            </div>
            <div class="control-row">
                <div class="ctrl-btn" id="prev-btn"><i class="fas fa-backward-step"></i> <span style="margin-left:6px">PREV</span></div>
                <div class="ctrl-btn" id="play-pause-btn"><i class="fas fa-play"></i> <span style="margin-left:6px">PLAY</span></div>
                <div class="ctrl-btn" id="next-btn"><i class="fas fa-forward-step"></i> <span style="margin-left:6px">NEXT</span></div>
                <div class="ctrl-btn" id="loop-btn"><i class="fas fa-repeat"></i> <span style="margin-left:6px">LOOP</span></div>
                <div class="ctrl-btn" id="upload-btn"><i class="fas fa-plus-circle"></i> <span style="margin-left:6px">ADD</span></div>
            </div>
        </div>
    </div>

    <div class="bottom-area">
        <div class="playlist-container" id="playlist-container"></div>
        <div class="volume-sidebar" id="volume-sidebar">
            <div class="sys-vol-label">VOLUME</div>
            <div class="led-container" id="led-container"></div>
            <div class="vol-percent" id="vol-percent">50%</div>
            <div class="sys-vol-badge linked" id="sys-vol-badge"><i class="fas fa-volume-up"></i> SYSTEM</div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<!-- Modal upload nhạc -->
<div id="upload-modal" class="modal">
    <div class="modal-content">
        <h3>THÊM NHẠC</h3>
        <div class="file-upload" id="file-upload-area">
            <i class="fas fa-cloud-upload-alt"></i> Chọn file âm thanh
        </div>
        <div class="input-group">
            <label>Tên hiển thị (tùy chọn)</label>
            <input type="text" id="song-title-input" placeholder="Tên bài hát">
        </div>
        <div class="modal-actions">
            <button class="btn-modal cancel" id="close-modal">Hủy</button>
            <button class="btn-modal" id="confirm-upload">Thêm</button>
        </div>
        <input type="file" id="file-input" accept="audio/*">
    </div>
</div>

<!-- Modal cài đặt bài hát (xoá, chỉnh thời gian phát) -->
<div id="song-settings-modal" class="modal">
    <div class="modal-content">
        <h3>CÀI ĐẶT BÀI HÁT</h3>
        <div class="input-group">
            <label><i class="fas fa-tag"></i> Tên bài</label>
            <input type="text" id="settings-song-name" readonly disabled style="background:#1e1e2e;">
        </div>
        <div class="input-group">
            <label><i class="fas fa-play-circle"></i> Bắt đầu (giây)</label>
            <input type="number" id="settings-start-time" step="0.1" min="0" value="0">
        </div>
        <div class="input-group">
            <label><i class="fas fa-stop-circle"></i> Kết thúc (giây) - <span style="color:#ff0055">0 = hết bài</span></label>
            <input type="number" id="settings-end-time" step="0.1" min="0" value="0">
        </div>
        <div class="modal-actions">
            <button class="btn-modal danger" id="delete-song-btn"><i class="fas fa-trash-alt"></i> Xoá bài</button>
            <button class="btn-modal cancel" id="close-settings-modal">Hủy</button>
            <button class="btn-modal" id="save-settings-btn">Lưu</button>
        </div>
    </div>
</div>

<script>
    // ---------- DATA ----------
    let playlist = [];          // mỗi phần tử: { name, url, startTime, endTime }
    let currentIndex = 0;
    let isPlaying = false;
    let loopMode = false;
    let audio = new Audio();
    let analyser = null;
    let sourceNode = null;
    let audioContext = null;
    let animationId = null;
    let ringCtx = null;
    let barsArray = [];

    let systemVolumeLinked = true;
    let currentVolume = 0.5;

    // Biến lưu bài đang chỉnh sửa settings
    let editingSongIndex = -1;

    // DOM elements
    const playPauseBtn = document.getElementById('play-pause-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const loopBtn = document.getElementById('loop-btn');
    const seekSlider = document.getElementById('seek-slider');
    const currentTimeSpan = document.getElementById('current-time');
    const durationSpan = document.getElementById('duration-time');
    const songTitleDisplay = document.getElementById('current-song-title');
    const playlistContainer = document.getElementById('playlist-container');
    const volPercentSpan = document.getElementById('vol-percent');
    const ledContainer = document.getElementById('led-container');
    const sysVolBadge = document.getElementById('sys-vol-badge');

    const visualizerDiv = document.getElementById('visualizerBars');
    const ringCanvas = document.getElementById('ringCanvas');
    ringCtx = ringCanvas.getContext('2d');

    for (let i = 0; i < 32; i++) {
        const bar = document.createElement('div');
        bar.classList.add('visual-bar');
        visualizerDiv.appendChild(bar);
        barsArray.push(bar);
    }

    // Volume UI
    function updateVolumeUI() {
        let vol = currentVolume;
        volPercentSpan.innerText = Math.round(vol * 100) + '%';
        const ledCount = 10;
        const activeCount = Math.floor(vol * ledCount);
        const ledBars = document.querySelectorAll('.led-bar');
        ledBars.forEach((led, idx) => {
            if (idx < activeCount) {
                led.classList.add('active');
                if (vol <= 0.33) led.style.backgroundColor = '#00e676';
                else if (vol <= 0.66) led.style.backgroundColor = '#ffea00';
                else led.style.backgroundColor = '#ff1744';
            } else {
                led.classList.remove('active');
                led.style.backgroundColor = '#1a1a1a';
            }
        });
        if (systemVolumeLinked) {
            sysVolBadge.className = 'sys-vol-badge linked';
            sysVolBadge.innerHTML = '<i class="fas fa-link"></i> SYSTEM LINK';
        } else {
            sysVolBadge.className = 'sys-vol-badge unlinked';
            sysVolBadge.innerHTML = '<i class="fas fa-unlink"></i> MANUAL';
        }
    }

    function buildLEDs() {
        ledContainer.innerHTML = '';
        for (let i = 0; i < 10; i++) {
            const led = document.createElement('div');
            led.classList.add('led-bar');
            ledContainer.appendChild(led);
        }
        updateVolumeUI();
    }
    buildLEDs();

    function setVolume(vol) {
        vol = Math.min(1, Math.max(0, vol));
        currentVolume = vol;
        if (audio) audio.volume = vol;
        updateVolumeUI();
    }

    sysVolBadge.addEventListener('click', () => {
        systemVolumeLinked = !systemVolumeLinked;
        showToast(systemVolumeLinked ? "Đã liên kết âm lượng hệ thống" : "Âm lượng thủ công");
        updateVolumeUI();
    });

    // Volume touch/mouse
    const volumeSidebar = document.getElementById('volume-sidebar');
    let isDraggingVolume = false;
    function handleVolumeMove(clientY, rect) {
        let yRelative = (rect.bottom - clientY) / rect.height;
        yRelative = Math.min(1, Math.max(0, yRelative));
        setVolume(yRelative);
    }
    volumeSidebar.addEventListener('mousedown', (e) => {
        isDraggingVolume = true;
        const rect = volumeSidebar.getBoundingClientRect();
        handleVolumeMove(e.clientY, rect);
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if (isDraggingVolume) {
            const rect = volumeSidebar.getBoundingClientRect();
            handleVolumeMove(e.clientY, rect);
        }
    });
    window.addEventListener('mouseup', () => { isDraggingVolume = false; });
    volumeSidebar.addEventListener('touchstart', (e) => {
        isDraggingVolume = true;
        const rect = volumeSidebar.getBoundingClientRect();
        const touch = e.touches[0];
        handleVolumeMove(touch.clientY, rect);
        e.preventDefault();
    });
    window.addEventListener('touchmove', (e) => {
        if (isDraggingVolume && e.touches.length) {
            const rect = volumeSidebar.getBoundingClientRect();
            handleVolumeMove(e.touches[0].clientY, rect);
        }
    });
    window.addEventListener('touchend', () => { isDraggingVolume = false; });

    // Audio Context & Visualizer
    function setupAudioContext() {
        if (audioContext && audioContext.state !== 'closed') return;
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        sourceNode = audioContext.createMediaElementSource(audio);
        sourceNode.connect(analyser);
        analyser.connect(audioContext.destination);
        sourceNode.connect(audioContext.destination);
        if (audioContext.state === 'suspended') audioContext.resume();
    }

    function updateVisualizer() {
        if (!analyser) {
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(updateVisualizer);
            return;
        }
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        const step = Math.floor(dataArray.length / barsArray.length);
        for (let i = 0; i < barsArray.length; i++) {
            let val = dataArray[i * step] || 0;
            let height = (val / 255) * 80 + 4;
            barsArray[i].style.height = height + 'px';
            let hue = 320 + (val / 255) * 40;
            barsArray[i].style.backgroundColor = `hsl(${hue}, 100%, 60%)`;
            barsArray[i].style.boxShadow = `0 0 ${val / 40}px #ff0055`;
        }
        if (ringCtx) {
            ringCtx.clearRect(0, 0, 160, 160);
            let avg = 0;
            for (let i = 0; i < dataArray.length; i++) avg += dataArray[i];
            avg /= dataArray.length;
            let radius = 40 + (avg / 255) * 50;
            ringCtx.beginPath();
            ringCtx.arc(80, 80, radius, 0, Math.PI * 2);
            ringCtx.strokeStyle = `rgba(255, 0, 85, ${0.3 + avg / 255 * 0.5})`;
            ringCtx.lineWidth = 3;
            ringCtx.stroke();
            for (let i = 0; i < 12; i++) {
                let angle = (Date.now() / 300 + i) % (Math.PI * 2);
                let r = 70 + (avg / 255) * 20;
                let x = 80 + Math.cos(angle) * r;
                let y = 80 + Math.sin(angle) * r;
                ringCtx.fillStyle = `#ff0055`;
                ringCtx.beginPath();
                ringCtx.arc(x, y, 3 + avg / 80, 0, 2 * Math.PI);
                ringCtx.fill();
            }
        }
        animationId = requestAnimationFrame(updateVisualizer);
    }
    updateVisualizer();

    // Helper
    function formatTime(sec) {
        if (isNaN(sec) || !isFinite(sec)) return "0:00";
        let mins = Math.floor(sec / 60);
        let secs = Math.floor(sec % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Kiểm tra và áp dụng startTime/endTime khi phát
    function enforceSongBounds() {
        if (!playlist[currentIndex]) return;
        const song = playlist[currentIndex];
        const start = song.startTime || 0;
        const end = song.endTime || 0;
        if (end > 0 && audio.currentTime >= end) {
            // Kết thúc đoạn
            if (loopMode) {
                audio.currentTime = start;
                audio.play();
            } else {
                nextSong();
            }
            return;
        }
        if (audio.currentTime < start) {
            audio.currentTime = start;
        }
    }

    // Load bài hát
    function loadSong(index) {
        if (!playlist[index]) return;
        const wasPlaying = isPlaying;
        audio.pause();
        isPlaying = false;
        const song = playlist[index];
        audio.src = song.url;
        songTitleDisplay.innerText = song.name;
        audio.load();
        audio.volume = currentVolume;
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        
        audio.addEventListener('canplaythrough', () => {
            if (audio.duration && isFinite(audio.duration)) {
                durationSpan.innerText = formatTime(audio.duration);
                // Áp dụng startTime nếu có
                const start = song.startTime || 0;
                if (start > 0 && audio.currentTime < start) audio.currentTime = start;
            }
        }, { once: true });
        
        if (wasPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayPauseUI();
            }).catch(e => console.log("Play error:", e));
        }
        updatePlaylistUI();
    }

    // Cập nhật danh sách phát (có nút settings)
    function updatePlaylistUI() {
        playlistContainer.innerHTML = '';
        playlist.forEach((song, idx) => {
            const btn = document.createElement('div');
            btn.classList.add('song-btn');
            if (idx === currentIndex && isPlaying) btn.classList.add('playing');
            btn.innerHTML = `<div class="song-name">${escapeHtml(song.name)}</div>`;
            // Thêm nút settings
            const settingsIcon = document.createElement('div');
            settingsIcon.className = 'song-settings-icon';
            settingsIcon.innerHTML = '<i class="fas fa-cog"></i>';
            settingsIcon.addEventListener('click', (e) => {
                e.stopPropagation();
                openSongSettings(idx);
            });
            btn.appendChild(settingsIcon);
            btn.addEventListener('click', () => {
                if (currentIndex === idx && isPlaying) {
                    pauseAudio();
                } else {
                    currentIndex = idx;
                    loadSong(currentIndex);
                    playAudio();
                }
                updatePlaylistUI();
            });
            playlistContainer.appendChild(btn);
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function playAudio() {
        if (!playlist.length) return;
        const song = playlist[currentIndex];
        const start = song.startTime || 0;
        if (audio.readyState >= 2 && audio.currentTime < start) audio.currentTime = start;
        audio.play().then(() => {
            isPlaying = true;
            updatePlayPauseUI();
            updatePlaylistUI();
        }).catch(e => {
            console.error("Playback failed:", e);
            showToast("Không thể phát định dạng này");
        });
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
    }

    function pauseAudio() {
        audio.pause();
        isPlaying = false;
        updatePlayPauseUI();
        updatePlaylistUI();
    }

    function updatePlayPauseUI() {
        const icon = playPauseBtn.querySelector('i');
        const span = playPauseBtn.querySelector('span');
        if (isPlaying) {
            icon.className = 'fas fa-pause';
            span.innerText = 'PAUSE';
        } else {
            icon.className = 'fas fa-play';
            span.innerText = 'PLAY';
        }
    }

    function nextSong() {
        if (!playlist.length) return;
        if (loopMode) {
            const song = playlist[currentIndex];
            const start = song.startTime || 0;
            audio.currentTime = start;
            if (!isPlaying) playAudio();
            else audio.play();
            return;
        }
        let newIndex = currentIndex + 1;
        if (newIndex >= playlist.length) newIndex = 0;
        currentIndex = newIndex;
        loadSong(currentIndex);
        playAudio();
    }

    function prevSong() {
        if (!playlist.length) return;
        let newIndex = currentIndex - 1;
        if (newIndex < 0) newIndex = playlist.length - 1;
        currentIndex = newIndex;
        loadSong(currentIndex);
        playAudio();
    }

    // Mở modal settings cho bài hát
    function openSongSettings(index) {
        editingSongIndex = index;
        const song = playlist[index];
        document.getElementById('settings-song-name').value = song.name;
        document.getElementById('settings-start-time').value = (song.startTime || 0);
        document.getElementById('settings-end-time').value = (song.endTime || 0);
        document.getElementById('song-settings-modal').style.display = 'flex';
    }

    // Lưu settings
    function saveSongSettings() {
        if (editingSongIndex === -1) return;
        const song = playlist[editingSongIndex];
        let start = parseFloat(document.getElementById('settings-start-time').value);
        let end = parseFloat(document.getElementById('settings-end-time').value);
        if (isNaN(start)) start = 0;
        if (isNaN(end)) end = 0;
        if (end < 0) end = 0;
        if (start < 0) start = 0;
        // Nếu end >0 và end <= start thì vô lý, có thể set end=0
        if (end > 0 && end <= start) {
            showToast("Thời gian kết thúc phải lớn hơn bắt đầu, đã đặt lại = 0");
            end = 0;
        }
        song.startTime = start;
        song.endTime = end;
        // Nếu bài đang phát, áp dụng ngay
        if (editingSongIndex === currentIndex && audio.src) {
            if (audio.currentTime < start) audio.currentTime = start;
            // Nếu đang quá end thì dừng
            if (end > 0 && audio.currentTime >= end) {
                if (loopMode) {
                    audio.currentTime = start;
                    audio.play();
                } else {
                    nextSong();
                }
            }
        }
        showToast(`Đã lưu cài đặt cho "${song.name}"`);
        document.getElementById('song-settings-modal').style.display = 'none';
        editingSongIndex = -1;
    }

    // Xoá bài hát
    function deleteCurrentSong() {
        if (editingSongIndex === -1) return;
        const removed = playlist.splice(editingSongIndex, 1)[0];
        showToast(`Đã xoá "${removed.name}"`);
        if (playlist.length === 0) {
            audio.pause();
            isPlaying = false;
            currentIndex = 0;
            songTitleDisplay.innerText = "Chọn bài hát";
            updatePlayPauseUI();
        } else {
            if (editingSongIndex < currentIndex) currentIndex--;
            else if (editingSongIndex === currentIndex) {
                if (currentIndex >= playlist.length) currentIndex = playlist.length - 1;
                if (currentIndex >= 0) loadSong(currentIndex);
                else { audio.pause(); isPlaying = false; }
            }
        }
        document.getElementById('song-settings-modal').style.display = 'none';
        editingSongIndex = -1;
        updatePlaylistUI();
    }

    // Sự kiện controls
    playPauseBtn.addEventListener('click', () => {
        if (!playlist.length) { showToast("Hãy thêm nhạc trước"); return; }
        if (isPlaying) pauseAudio();
        else playAudio();
    });
    prevBtn.addEventListener('click', prevSong);
    nextBtn.addEventListener('click', nextSong);
    loopBtn.addEventListener('click', () => {
        loopMode = !loopMode;
        if (loopMode) loopBtn.classList.add('active-loop');
        else loopBtn.classList.remove('active-loop');
        showToast(loopMode ? "Lặp lại bài hiện tại" : "Tắt lặp");
    });

    audio.addEventListener('timeupdate', () => {
        if (audio.duration && isFinite(audio.duration)) {
            let percent = (audio.currentTime / audio.duration) * 100;
            seekSlider.value = percent;
            currentTimeSpan.innerText = formatTime(audio.currentTime);
            document.getElementById('current-time-display').innerHTML = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
            // Kiểm tra bounds
            enforceSongBounds();
        }
    });
    audio.addEventListener('ended', () => {
        if (loopMode) {
            const song = playlist[currentIndex];
            const start = song.startTime || 0;
            audio.currentTime = start;
            audio.play();
        } else {
            nextSong();
        }
    });
    seekSlider.addEventListener('input', (e) => {
        if (audio.duration && isFinite(audio.duration)) {
            let newTime = (e.target.value / 100) * audio.duration;
            const song = playlist[currentIndex];
            const start = song?.startTime || 0;
            const end = song?.endTime || 0;
            if (newTime < start) newTime = start;
            if (end > 0 && newTime > end) newTime = end;
            audio.currentTime = newTime;
        }
    });

    // Upload modal
    const modalUpload = document.getElementById('upload-modal');
    const uploadBtn = document.getElementById('upload-btn');
    const closeModalUpload = document.getElementById('close-modal');
    const confirmUpload = document.getElementById('confirm-upload');
    const fileUploadArea = document.getElementById('file-upload-area');
    const fileInput = document.getElementById('file-input');
    let selectedFile = null;

    uploadBtn.addEventListener('click', () => {
        modalUpload.style.display = 'flex';
    });
    closeModalUpload.addEventListener('click', () => {
        modalUpload.style.display = 'none';
        selectedFile = null;
    });
    fileUploadArea.addEventListener('click', () => {
        fileInput.click();
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) selectedFile = e.target.files[0];
    });
    confirmUpload.addEventListener('click', () => {
        if (!selectedFile) { showToast("Chọn file âm thanh"); return; }
        const customName = document.getElementById('song-title-input').value.trim();
        let songName = customName || selectedFile.name.replace(/\.[^/.]+$/, "");
        const url = URL.createObjectURL(selectedFile);
        playlist.push({ name: songName, url: url, startTime: 0, endTime: 0 });
        if (playlist.length === 1) {
            currentIndex = 0;
            loadSong(0);
        } else {
            updatePlaylistUI();
        }
        modalUpload.style.display = 'none';
        selectedFile = null;
        document.getElementById('song-title-input').value = '';
        fileInput.value = '';
        showToast(`Đã thêm: ${songName}`);
    });

    // Modal settings events
    const settingsModal = document.getElementById('song-settings-modal');
    const closeSettings = document.getElementById('close-settings-modal');
    const saveSettings = document.getElementById('save-settings-btn');
    const deleteBtn = document.getElementById('delete-song-btn');
    closeSettings.addEventListener('click', () => {
        settingsModal.style.display = 'none';
        editingSongIndex = -1;
    });
    saveSettings.addEventListener('click', saveSongSettings);
    deleteBtn.addEventListener('click', deleteCurrentSong);

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    setVolume(0.5);
    updatePlaylistUI();
</script>
</body>
</html>
