<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Music Player - Fixed & Redesigned</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #808080;
            --bg-screen: #000000;
            --bg-panel: #404040; /* Tối hơn một chút để nổi bật volume */
            --btn-bg: #2a2a2a;
            --btn-border: #555;
            --accent: #ff0055;
            --text-main: #fff;
            --text-yellow: #ffd700;
            --led-off: #2a2a2a; /* LED tắt sáng hơn chút để nhìn thấy */
            --led-low: #00e676;  
            --led-mid: #ffea00;  
            --led-high: #ff1744; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            height: 100%; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- PHẦN 1: MÀN HÌNH CHÍNH --- */
        .main-screen {
            background-color: var(--bg-screen);
            flex: 1; /* Chiếm hết không gian dư */
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border:1px solid #333;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-height: 0; 
        }

        .signature {
            position: absolute; top: 15px; right: 20px;
            font-size: 0.9rem; color: #888; z-index: 25;
            pointer-events: none;
        }
        .signature span { font-weight: 800; color: var(--text-yellow); text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }

        .top-info {
            position: absolute; top: 25px; left: 0; width: 100%;
            text-align: center; z-index: 20; padding: 0 20px;
        }
        .song-title-display { font-size: 1.5rem; font-weight: 800; text-shadow: 0 2px 10px black; margin-bottom: 5px; }
        .song-time-display { font-size: 0.9rem; color: var(--accent); font-family: monospace; }

        .visual-full {
            position: absolute; top: 80px; left: 0; width: 100%; height: 200px;
            display: flex; align-items: flex-end; justify-content: center; gap: 4px;
            z-index: 5; padding: 0 10%;
        }
        .visual-bar {
            width: 100%; background: linear-gradient(to top, var(--accent), transparent);
            border-radius: 2px 2px 0 0; transition: height 0.05s ease;
        }

        .controls-area {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; display: flex; flex-direction: column; gap: 10px; z-index: 30;
        }

        .progress-wrapper {
            width: 100%; background: rgba(0,0,0,0.6); padding: 10px 15px;
            border-radius: 8px; border: 1px solid #555;
            display: flex; align-items: center; gap: 10px;
        }
        .progress-time { font-size: 0.8rem; color: #ccc; width: 45px; text-align: center; }
        #seek-slider {
            flex: 1; height: 6px; background: #222; border-radius: 3px;
            outline: none; -webkit-appearance: none; cursor: pointer;
        }
        #seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px var(--accent); cursor: pointer;
        }

        /* --- NÚT CHỨC NĂNG (THIẾT KẾ LẠI LED) --- */
        .control-row {
            background: rgba(40, 40, 40, 0.9); backdrop-filter: blur(10px);
            border-radius: 8px; padding: 8px 10px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 1px solid #555; /* Viền mặc định rõ hơn */
            height: 50px; gap: 5px;
        }
        
        .ctrl-btn {
            background: rgba(0,0,0,0.3); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.3); /* Viền mờ mặc định */
            font-size: 0.75rem; font-weight: 700; /* Chữ đậm */
            text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; padding: 6px 12px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            letter-spacing: 0.5px;
            min-width: 60px; /* Độ rộng tối thiểu */
        }
        
        /* Hiệu ứng Hover LED cho tất cả nút */
        .ctrl-btn:hover {
            color: var(--accent);
            background: rgba(255, 0, 85, 0.15);
            border: 1px solid var(--accent); /* Viền đỏ */
            box-shadow: 0 0 15px var(--accent); /* Ánh đỏ */
            transform: translateY(-2px);
        }

        /* Nút Play đặc biệt */
        .ctrl-btn.play-pause {
            color: var(--accent);
            border: 1px solid var(--accent);
            background: rgba(255, 0, 85, 0.1);
            font-weight: 900;
            font-size: 1.1rem;
        }
        
        /* Nút Loop Active */
        .ctrl-btn.active-loop {
            color: var(--text-yellow);
            border: 1px solid var(--text-yellow);
            background: rgba(255, 215, 0, 0.15);
            text-shadow: 0 0 8px var(--text-yellow);
            box-shadow: 0 0 15px var(--text-yellow);
        }

        /* --- PHẦN 2: KHU VỰC DƯỚI --- */
        .bottom-area {
            height: 35vh; /* Chiều cao cố định */
            display: flex; /* Flexbox cho khớp viền tốt */
            gap: 15px;
        }

        /* Playlist */
        .playlist-container {
            background-color: var(--bg-panel); border-radius: 8px; padding: 15px;
            overflow-y: auto; flex: 1; /* Chiếm phần còn lại */
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 90px; gap: 12px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2); border: 1px solid #666;
            align-content: start;
        }

        .song-btn {
            background: var(--btn-bg); border: 1px solid var(--btn-border);
            color: #ddd; border-radius: 6px; position: relative; cursor: pointer;
            display: flex; justify-content: center; align-items: center; padding: 10px;
            transition: 0.3s;
        }
        .song-btn:hover, .song-btn.playing {
            box-shadow: 0 0 15px var(--accent); border-color: var(--accent);
            color: white; background: #333;
        }
        .song-btn.playing { background: rgba(255,0,85,0.15); }
        .song-name { font-size: 0.85rem; text-align: center; word-break: break-word; font-weight: 500; line-height: 1.3; width: 100%; }
        .song-settings-icon {
            position: absolute; top: 5px; right: 5px; font-size: 0.7rem;
            color: #666; padding: 3px; z-index: 2; opacity: 0;
            border-radius: 2px; background: rgba(0,0,0,0.3);
        }
        .song-btn:hover .song-settings-icon { opacity: 1; color: white; background: var(--accent); }

        /* --- THANH ÂM LƯỢNG (SỬA LẠI) --- */
        .volume-sidebar {
            background-color: var(--bg-panel); border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            position: relative; padding: 15px 0; border: 1px solid #666;
            width: 90px; /* Rộng hơn để dễ thấy */
            min-width: 90px; /* Cố định chiều rộng */
            flex-shrink: 0; /* Không bị playlist co lại */
        }

        .led-container {
            display: flex; flex-direction: column-reverse; gap: 4px; /* Khoảng cách to hơn */
            height: 90%; width: 40px; /* Rộng hơn */
            justify-content: flex-start; align-items: center;
        }

        .led-bar {
            width: 100%; height: 14px; /* Cao hơn để dễ nhìn */
            background: var(--led-off);
            border-radius: 3px; /* Bo tròn nhiều hơn */
            transition: all 0.1s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .led-bar.active { box-shadow: 0 0 8px currentColor; }

        /* Input âm lượng - Mở rộng vùng click tối đa */
        #vol-slider {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 9999; /* Z-index rất cao */
            transform: rotate(-90deg); width: 300%; left: -100%; /* Rộng cực lớn để không bỏ sót click */
        }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 8px;
            width: 350px; border: 1px solid #555; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .modal-content h3 { margin-bottom: 20px; color: var(--accent); }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .input-group input[type="text"] {
            width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 4px;
        }
        .file-upload {
            border: 2px dashed #555; padding: 20px; border-radius: 8px;
            cursor: pointer; transition: 0.3s; color: #aaa; font-size: 0.9rem; margin-bottom: 15px;
        }
        .file-upload:hover { border-color: var(--accent); color: white; background: rgba(255,0,85,0.05); }
        #file-input { display: none; }

        .modal-actions { display: flex; gap: 10px; }
        .btn-modal { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; flex: 1; }
        .btn-save { background: var(--accent); }
        .btn-close { background: #444; }
        .btn-del { background: #d32f2f; }

        #settings-modal .modal-content { width: 320px; }
        #settings-modal input {
            width: 100%; padding: 12px; margin: 8px 0; background: #111;
            border: 1px solid #444; color: white; border-radius: 4px; font-size: 1rem;
        }

        .playlist-container::-webkit-scrollbar { width: 6px; }
        .playlist-container::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- MÀN HÌNH CHÍNH -->
        <div class="main-screen">
            <div class="signature">Design by <span>NMC</span></div>

            <div class="top-info">
                <div class="song-title-display" id="main-title">Chưa chọn bài</div>
                <div class="song-time-display" id="main-time">00:00 / 00:00</div>
            </div>

            <div class="visual-full" id="visualizer"></div>

            <div class="controls-area">
                <div class="progress-wrapper">
                    <span class="progress-time" id="curr-time-txt">-00:00</span>
                    <input type="range" id="seek-slider" min="0" max="100" value="0">
                    <span class="progress-time" id="total-time-txt">00:00</span>
                </div>

                <div class="control-row">
                    <button class="ctrl-btn" id="btn-prev">PREV</button>
                    <button class="ctrl-btn play-pause" id="btn-play">PLAY</button>
                    <button class="ctrl-btn" id="btn-next">NEXT</button>
                    <button class="ctrl-btn active-loop" id="btn-loop">LOOP</button>
                    <button class="ctrl-btn" id="btn-add">ADD</button>
                </div>
            </div>
        </div>

        <!-- KHU VỰC DƯỚI -->
        <div class="bottom-area">
            <div class="playlist-container" id="playlist-container"></div>
            
            <!-- THANH ÂM LƯỢNG -->
            <div class="volume-sidebar">
                <div class="led-container" id="led-bars"></div>
                <input type="range" id="vol-slider" min="0" max="100" value="50">
            </div>
        </div>
    </div>

    <!-- MODAL THÊM NHẠC -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <h3>Thêm nhạc từ máy</h3>
            <div class="input-group">
                <label>Tên bài hát</label>
                <input type="text" id="new-song-name" placeholder="Nhập tên hiển thị...">
            </div>
            <div class="file-upload" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-music"></i> Chọn file nhạc từ bộ nhớ
            </div>
            <input type="file" id="file-input" accept="audio/*">
            <div class="modal-actions">
                <button class="btn-modal btn-close" onclick="closeModal('add-modal')">Hủy</button>
                <button class="btn-modal btn-save" id="btn-confirm-add">Thêm vào danh sách</button>
            </div>
        </div>
    </div>

    <!-- MODAL CÀI ĐẶT -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3>Cài đặt bài hát</h3>
            <p id="modal-song-name" style="color:#aaa; font-size:0.9rem; margin-bottom:10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
            <label style="display:block; text-align:left; font-size:0.8rem; margin-left:5px;">Bắt đầu (giây)</label>
            <input type="number" id="input-start" placeholder="0">
            <label style="display:block; text-align:left; font-size:0.8rem; margin-left:5px;">Kết thúc (giây)</label>
            <input type="number" id="input-end" placeholder="Kết thúc">
            <div class="modal-actions">
                <button class="btn-modal btn-del" id="btn-delete-song">Xóa</button>
                <button class="btn-modal btn-save" id="btn-save-settings">Lưu</button>
            </div>
            <button class="btn-modal" onclick="document.getElementById('settings-modal').style.display='none'" style="width:100%; margin-top:15px; background:#444;">Đóng</button>
        </div>
    </div>

    <script>
        // --- LOGIC LOCALSTORAGE ---
        const STORAGE_KEY = 'nmc_player_songs';
        function getSongs() { const stored = localStorage.getItem(STORAGE_KEY); return stored ? JSON.parse(stored) : []; }
        function saveSongs(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

        // --- STATE ---
        let songs = getSongs();
        let currentIndex = -1;
        let isPlaying = false;
        let isLooping = true;
        let currentVolume = 0.5;
        let editingIndex = -1;
        
        // --- AUDIO ENGINE ---
        let mainAudio = new Audio();
        let fadeAudio = new Audio();
        let activeAudio = mainAudio;

        let isDraggingProgress = false;
        let animationFrameId;

        // --- DOM ---
        const mainTitle = document.getElementById('main-title');
        const mainTime = document.getElementById('main-time');
        const currTimeTxt = document.getElementById('curr-time-txt');
        const totalTimeTxt = document.getElementById('total-time-txt');
        const seekSlider = document.getElementById('seek-slider');
        const playlistContainer = document.getElementById('playlist-container');
        const visualizer = document.getElementById('visualizer');
        const ledContainer = document.getElementById('led-bars');
        const btnLoop = document.getElementById('btn-loop');

        // --- INIT ---
        function init() {
            createVisualBars(40);
            createLedBars(20);
            renderPlaylist();
            updateLedVisual(currentVolume * 100);
            setupEventListeners();
            
            if(isLooping) {
                btnLoop.classList.add('active-loop');
                btnLoop.innerHTML = 'LOOP ON';
            }
        }

        function createVisualBars(count) {
            visualizer.innerHTML = '';
            for(let i=0; i<count; i++) {
                let bar = document.createElement('div');
                bar.className = 'visual-bar';
                visualizer.appendChild(bar);
            }
        }

        function createLedBars(count) {
            ledContainer.innerHTML = '';
            for(let i=0; i<count; i++) {
                let bar = document.createElement('div');
                bar.className = 'led-bar';
                ledContainer.appendChild(bar);
            }
        }

        // --- LOGIC CROSSFADE & CHUYỂN BÀI ---
        function playSongAtIndex(index) {
            if (index < 0 || index >= songs.length) return;
            let song = songs[index];
            
            if (index === currentIndex && isPlaying) {
                togglePlay();
                return;
            }

            currentIndex = index;
            renderPlaylist();
            loadSongUI(song);

            let outgoing = null;
            // Chỉ Fade Out nếu đang có nhạc phát
            if (isPlaying && activeAudio && activeAudio.currentTime > 0) {
                outgoing = activeAudio;
            }
            let incoming = (activeAudio === mainAudio) ? fadeAudio : mainAudio;

            if (outgoing) {
                // FADE OUT
                let fadeOutInterval = setInterval(() => {
                    if (outgoing.volume > 0.1) {
                        outgoing.volume -= 0.02;
                    } else {
                        clearInterval(fadeOutInterval);
                        outgoing.pause();
                        outgoing.currentTime = 0;
                        startIncomingSong(incoming, song, outgoing);
                    }
                }, 10);
            } else {
                startIncomingSong(activeAudio, song, null);
            }
        }

        function startIncomingSong(audioObj, song, outgoingAudio) {
            activeAudio = audioObj; // Chuyển activeAudio ngay để UI cập nhật
            audioObj.src = song.url;
            audioObj.currentTime = song.start;
            audioObj.volume = 0;

            audioObj.play().then(() => {
                isPlaying = true;
                document.getElementById('btn-play').innerText = 'PAUSE';
                
                // FADE IN
                let fadeInInterval = setInterval(() => {
                    if (audioObj.volume < currentVolume) {
                        audioObj.volume += 0.02;
                    } else {
                        clearInterval(fadeInInterval);
                        audioObj.volume = currentVolume;
                        // Tắt hẳn bài cũ nếu còn sót
                        if (outgoingAudio) {
                            outgoingAudio.pause();
                            outgoingAudio.currentTime = 0;
                        }
                    }
                }, 10);

                startPlaybackLoop();
                startVisualAnimation();
            }).catch(err => {
                console.error("Lỗi phát nhạc:", err);
            });
        }

        // --- VÒNG LẶP UI ---
        function startPlaybackLoop() {
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function loop() {
                if (!isDraggingProgress && isPlaying && songs[currentIndex]) {
                    let cur = activeAudio.currentTime;
                    let song = songs[currentIndex];
                    if (cur >= song.end) {
                        if (isLooping) activeAudio.currentTime = song.start;
                        else { playSongAtIndex((currentIndex + 1) % songs.length); return; }
                    }
                    updateTimeDisplay();
                }
                animationFrameId = requestAnimationFrame(loop);
            }
            loop();
        }

        // --- TUA NHANH ---
        function handleSeekChange(value) {
            let targetTime = parseFloat(value);
            let song = songs[currentIndex];
            if (!song) return;
            let diff = targetTime - activeAudio.currentTime;
            if (isDraggingProgress && Math.abs(diff) > 2) { activeAudio.playbackRate = 3.0; }
            else { activeAudio.playbackRate = 1.0; }
        }

        seekSlider.addEventListener('mousedown', () => { isDraggingProgress = true; });
        seekSlider.addEventListener('touchstart', () => { isDraggingProgress = true; });
        seekSlider.addEventListener('input', (e) => { handleSeekChange(e.target.value); updateTimeDisplay(true); });
        seekSlider.addEventListener('mouseup', finishSeek);
        seekSlider.addEventListener('touchend', finishSeek);

        function finishSeek() {
            isDraggingProgress = false;
            activeAudio.currentTime = parseFloat(seekSlider.value);
            activeAudio.playbackRate = 1.0;
            updateTimeDisplay();
        }

        // --- UI UPDATES ---
        function loadSongUI(song) {
            mainTitle.innerText = song.name;
            seekSlider.min = song.start;
            seekSlider.max = song.end;
            seekSlider.value = activeAudio.currentTime || song.start;
            updateTimeDisplay();
        }

        function updateTimeDisplay(isManual = false) {
            let song = songs[currentIndex];
            if (!song) return;
            let cur = isManual ? parseFloat(seekSlider.value) : activeAudio.currentTime;
            let remaining = song.end - cur;
            currTimeTxt.innerText = "-" + formatTime(remaining);
            seekSlider.value = cur;
            totalTimeTxt.innerText = formatTime(song.end - song.start);
            mainTime.innerText = `${formatTime(cur)} / ${formatTime(song.end)}`;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            let m = Math.floor(seconds/60);
            let s = Math.floor(seconds%60);
            return `${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
        }

        // --- VISUALIZER ---
        function startVisualAnimation() {
            let animInterval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(animInterval);
                    const bars = document.querySelectorAll('.visual-bar');
                    bars.forEach(bar => { bar.style.height = '0%'; bar.style.background = 'transparent'; });
                    return;
                }
                const bars = document.querySelectorAll('.visual-bar');
                bars.forEach(bar => {
                    let h = Math.random() * 100;
                    bar.style.height = h + '%';
                    if(h > 70) bar.style.background = 'var(--accent)';
                    else bar.style.background = 'linear-gradient(to top, var(--accent), transparent)';
                });
            }, 100);
        }

        function stopVisualAnimation() {
            const bars = document.querySelectorAll('.visual-bar');
            bars.forEach(bar => { bar.style.height = '0%'; bar.style.background = 'transparent'; });
        }

        function updateLedVisual(vol) {
            const bars = document.querySelectorAll('.led-bar');
            const numLit = Math.ceil((vol / 100) * bars.length);
            bars.forEach((bar, index) => {
                bar.classList.remove('active');
                if (index < numLit) {
                    let percent = (index / bars.length) * 100;
                    if (percent < 50) { bar.style.backgroundColor = 'var(--led-low)'; bar.style.color = 'var(--led-low)'; }
                    else if (percent < 80) { bar.style.backgroundColor = 'var(--led-mid)'; bar.style.color = 'var(--led-mid)'; }
                    else { bar.style.backgroundColor = 'var(--led-high)'; bar.style.color = 'var(--led-high)'; }
                    bar.classList.add('active');
                } else {
                    bar.style.backgroundColor = 'var(--led-off)'; bar.style.boxShadow = 'none';
                }
            });
        }

        // --- RENDER & SETUP ---
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            songs.forEach((song, index) => {
                const btn = document.createElement('div');
                btn.className = `song-btn ${index === currentIndex ? 'playing' : ''}`;
                btn.innerHTML = `
                    <i class="fas fa-cog song-settings-icon" title="Cài đặt"></i>
                    <span class="song-name">${song.name}</span>
                `;
                btn.addEventListener('click', (e) => {
                    if (e.target.classList.contains('song-settings-icon')) openSettings(index);
                    else playSongAtIndex(index);
                });
                playlistContainer.appendChild(btn);
            });
        }

        function setupEventListeners() {
            document.getElementById('btn-play').addEventListener('click', togglePlay);
            document.getElementById('btn-next').addEventListener('click', () => playSongAtIndex((currentIndex + 1) % songs.length));
            document.getElementById('btn-prev').addEventListener('click', () => playSongAtIndex((currentIndex - 1 + songs.length) % songs.length));
            document.getElementById('btn-loop').addEventListener('click', () => {
                isLooping = !isLooping;
                if(isLooping) {
                    btnLoop.classList.add('active-loop');
                    btnLoop.innerHTML = 'LOOP ON';
                } else {
                    btnLoop.classList.remove('active-loop');
                    btnLoop.innerHTML = 'LOOP';
                }
            });

            const volSlider = document.getElementById('vol-slider');
            volSlider.addEventListener('input', (e) => {
                currentVolume = parseInt(e.target.value) / 100;
                activeAudio.volume = currentVolume;
                updateLedVisual(parseInt(e.target.value));
            });

            // Add Song
            document.getElementById('btn-add').addEventListener('click', () => {
                document.getElementById('new-song-name').value = '';
                document.getElementById('file-input').value = '';
                document.getElementById('add-modal').style.display = 'flex';
            });

            document.getElementById('file-input').addEventListener('change', function(e) {
                if (this.files && this.files[0]) {
                    let fileName = this.files[0].name.replace(/\.[^/.]+$/, "");
                    document.getElementById('new-song-name').value = fileName;
                }
            });

            document.getElementById('btn-confirm-add').addEventListener('click', () => {
                let name = document.getElementById('new-song-name').value.trim();
                let fileInput = document.getElementById('file-input');
                if (!name || !fileInput.files[0]) return alert("Vui lòng nhập tên và chọn file!");
                let fileUrl = URL.createObjectURL(fileInput.files[0]);
                let newSong = { id: Date.now(), name: name, url: fileUrl, duration: 300, start: 0, end: 300 };
                let tempAudio = new Audio(fileUrl);
                tempAudio.addEventListener('loadedmetadata', () => {
                    newSong.duration = tempAudio.duration;
                    newSong.end = tempAudio.duration;
                    songs.push(newSong);
                    saveSongs(songs);
                    renderPlaylist();
                    closeModal('add-modal');
                });
                setTimeout(() => {
                    if (newSong.duration === 300) { songs.push(newSong); saveSongs(songs); renderPlaylist(); closeModal('add-modal'); }
                }, 2000);
            });

            // Settings
            document.getElementById('btn-save-settings').addEventListener('click', () => {
                if (editingIndex > -1) {
                    let s = parseInt(document.getElementById('input-start').value);
                    let e = parseInt(document.getElementById('input-end').value);
                    if (s >= 0 && e > s) {
                        songs[editingIndex].start = s;
                        songs[editingIndex].end = e;
                        songs[editingIndex].duration = e - s;
                        saveSongs(songs);
                        if (currentIndex === editingIndex) loadSongUI(songs[currentIndex]);
                        closeModal('settings-modal');
                    } else alert("Thời gian không hợp lệ!");
                }
            });

            document.getElementById('btn-delete-song').addEventListener('click', () => {
                if (confirm("Xóa bài này?")) {
                    songs.splice(editingIndex, 1);
                    saveSongs(songs);
                    if (currentIndex === editingIndex) {
                        activeAudio.pause();
                        activeAudio.currentTime = 0;
                        activeAudio.src = "";
                        currentIndex = -1; isPlaying = false;
                        mainTitle.innerText = "Danh sách phát";
                        stopVisualAnimation();
                        document.getElementById('btn-play').innerText = 'PLAY';
                    } else if (currentIndex > editingIndex) {
                        currentIndex--;
                    }
                    renderPlaylist();
                    closeModal('settings-modal');
                }
            });
        }

        function togglePlay() {
            if (currentIndex === -1 && songs.length > 0) { playSongAtIndex(0); return; }
            if (isPlaying) {
                activeAudio.pause();
                isPlaying = false;
                document.getElementById('btn-play').innerText = 'PLAY';
                stopVisualAnimation();
            } else {
                activeAudio.play();
                isPlaying = true;
                document.getElementById('btn-play').innerText = 'PAUSE';
                startPlaybackLoop();
                startVisualAnimation();
            }
        }

        function openSettings(index) {
            editingIndex = index;
            const song = songs[index];
            document.getElementById('modal-song-name').innerText = song.name;
            document.getElementById('input-start').value = song.start;
            document.getElementById('input-end').value = song.end;
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        init();
    </script>
</body>
</html>
